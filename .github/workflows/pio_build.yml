name: PlatformIO ESP32 Build

on:
  push:
    branches: [main]
    paths:
      - 'firmware/**'
      - '.github/workflows/pio_build.yml'
  pull_request:
    paths:
      - 'firmware/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        working-directory: firmware
        run: pio run --environment esp32dev

      - name: Run unit tests (host)
        working-directory: firmware
        run: pio test --environment native --filter test_pid --filter test_odometry
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: firmware-bin
          path: firmware/.pio/build/esp32dev/*.bin
          retention-days: 7
